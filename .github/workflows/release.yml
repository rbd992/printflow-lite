name: Build & Release PrintFlow Lite

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: npm install
      - name: Install server deps
        run: cd src/server && npm install
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3 --module-dir src/server
        env:
          npm_config_msvs_version: '2019'
      - name: Build React
        run: npm run react-build
      - name: Build Mac DMG
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: npm install
      - name: Install server deps
        run: cd src/server && npm install
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3 --module-dir src/server
        env:
          npm_config_msvs_version: '2019'
      - name: Build React
        run: npm run react-build
      - name: Build Windows EXE
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: npm install
      - name: Install server deps
        run: cd src/server && npm install
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3 --module-dir src/server
      - name: Build React
        run: npm run react-build
      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./dist

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./dist

      - name: List dist files
        run: ls -la dist/

      - name: Get version
        id: ver
        run: echo "VERSION=$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: PrintFlow Lite v${{ steps.ver.outputs.VERSION }}
          body: |
            ## PrintFlow Lite v${{ steps.ver.outputs.VERSION }}

            ### Installation

            **Mac (Apple Silicon M1–M4):** Download `arm64.dmg`
            **Mac (Intel):** Download the regular `.dmg`
            > First launch: right-click → Open → Open (one-time Apple security step)
            > If you see "damaged": run `xattr -cr "/Applications/PrintFlow Lite.app"` in Terminal

            **Windows:** Download and run `.exe`
            > If SmartScreen appears: More info → Run anyway

            **Linux:**
            ```bash
            chmod +x PrintFlowLite-*.AppImage && ./PrintFlowLite-*.AppImage
            ```

            ### What's new
            See the Changelog tab inside the app for full release notes.
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.VERSION, 'beta') || contains(steps.ver.outputs.VERSION, 'alpha') }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
